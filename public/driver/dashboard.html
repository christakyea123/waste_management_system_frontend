﻿﻿<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/logo/Arkoh logo.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Driver Dashboard | 035 F Arkoh Waste Management</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="/css/dashboard.css?v=7" />
  <style>
    .collection-card { background: var(--white); border: 1px solid var(--gray-200); border-radius: var(--radius); padding: 1rem; transition: all var(--transition); cursor: pointer; }
    .collection-card:hover { box-shadow: var(--shadow); border-color: var(--green-300); }
    .collection-card.status-picked { border-left: 4px solid var(--green-500); }
    .collection-card.status-missed { border-left: 4px solid var(--red-500); }
    .collection-card.status-scheduled { border-left: 4px solid var(--yellow-500); }
    .collections-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1rem; }
    .customer-info { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 0.75rem; }
    .addr-text { font-size: 0.8rem; color: var(--gray-400); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .action-btns { display: flex; gap: 0.4rem; flex-wrap: wrap; }
    .progress-bar { height: 6px; background: var(--gray-100); border-radius: 3px; overflow: hidden; margin-top: 0.5rem; }
    .progress-fill { height: 100%; background: var(--green-500); border-radius: 3px; transition: width 0.5s ease; }
  </style>
  <script>document.documentElement.setAttribute('data-theme', localStorage.getItem('wm_theme') || 'light');</script>
</head>
<body>
<div class="dashboard-wrapper">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <a href="/driver/dashboard.html" class="sidebar-logo"><img src="/logo/Arkoh logo.png" alt="035 F Arkoh Waste Management" class="sidebar-logo-img" /></a>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section">
        <div class="nav-section-title">Main</div>
        <a href="/driver/dashboard.html" class="nav-item active"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
        <a href="/driver/collections.html" class="nav-item"><i class="fas fa-truck"></i> All Collections</a>
        <a href="/driver/customers.html" class="nav-item"><i class="fas fa-users"></i> My Customers</a>
      </div>
      <div class="nav-section">
        <div class="nav-section-title">Account</div>
        <a href="/driver/profile.html" class="nav-item"><i class="fas fa-user-circle"></i> Profile</a>
      </div>
    </nav>
    <div class="sidebar-footer">
      <div class="user-info">
        <div class="user-avatar" id="sidebarAvatar">D</div>
        <div class="user-details">
          <div class="user-name" id="sidebarName">Driver</div>
          <div class="user-role">Driver</div>
        </div>
        <button class="logout-btn" onclick="doLogout()"><i class="fas fa-sign-out-alt"></i></button>
      </div>
    </div>
  </aside>

  <main class="main-content">
    <header class="topbar">
      <button class="topbar-btn sidebar-toggle" id="sidebarToggle"><i class="fas fa-bars"></i></button>
      <span class="topbar-title">Driver Dashboard</span>
      <div class="topbar-actions">
        <button class="topbar-btn" data-theme-toggle><i class="fas fa-moon"></i></button>
        <button class="btn btn-sm btn-outline" id="locationBtn" onclick="shareLocation()" title="Share location">
          <i class="fas fa-map-marker-alt"></i> <span class="hidden-sm">Share Location</span>
        </button>
      </div>
    </header>

    <div class="page-content">
      <div class="page-header">
        <div>
          <h1 id="welcomeMsg">Driver Dashboard</h1>
          <p id="todayDate"></p>
        </div>
      </div>

      <!-- Stats -->
      <div class="stats-grid" id="statsGrid">
        <div class="stat-card"><div class="skeleton" style="height:80px"></div></div>
        <div class="stat-card"><div class="skeleton" style="height:80px"></div></div>
        <div class="stat-card"><div class="skeleton" style="height:80px"></div></div>
        <div class="stat-card"><div class="skeleton" style="height:80px"></div></div>
      </div>

      <!-- Progress Bar -->
      <div class="card" style="margin-top:1rem;margin-bottom:1.5rem">
        <div class="card-body" style="padding:1rem">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.4rem">
            <span style="font-size:0.85rem;font-weight:600;color:#334155">Today's Progress</span>
            <span id="progressText" style="font-size:0.85rem;color:#64748b">0 / 0 completed</span>
          </div>
          <div class="progress-bar">
            <div class="progress-fill" id="progressFill" style="width:0%"></div>
          </div>
        </div>
      </div>

      <!-- Today's Collections -->
      <div class="flex items-center justify-between mb-2">
        <h2 style="font-size:1rem;font-weight:700;color:#0f172a">Today's Pickups</h2>
        <div style="display:flex;gap:0.5rem">
          <select class="form-control" id="statusFilterDriver" style="width:130px;padding:0.4rem 0.7rem;font-size:0.8rem" onchange="filterCollections()">
            <option value="">All Status</option>
            <option value="scheduled">Scheduled</option>
            <option value="picked">Picked</option>
            <option value="missed">Missed</option>
          </select>
        </div>
      </div>

      <div class="collections-grid" id="collectionsGrid">
        <div class="skeleton" style="height:120px;border-radius:12px"></div>
        <div class="skeleton" style="height:120px;border-radius:12px"></div>
        <div class="skeleton" style="height:120px;border-radius:12px"></div>
      </div>

      <!-- Map -->
      <div class="card" style="margin-top:1.5rem">
        <div class="card-header">
          <span class="card-title">Today's Route Map</span>
        </div>
        <div class="card-body" style="padding:0">
          <div id="routeMap" style="height:350px;border-radius:0 0 12px 12px"></div>
        </div>
      </div>
    </div>
  </main>
</div>

<!-- Update Status Modal -->
<div class="modal-overlay" id="statusModal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">Update Collection Status</span>
      <button class="modal-close" onclick="closeStatusModal()"><i class="fas fa-times"></i></button>
    </div>
    <div class="modal-body">
      <div id="statusCustomerInfo" style="background:#f8fafc;border-radius:10px;padding:1rem;margin-bottom:1rem;font-size:0.875rem"></div>
      <div class="form-group">
        <label class="form-label">Collection Status *</label>
        <select class="form-control" id="newStatus">
          <option value="picked">Picked &mdash; Successfully collected</option>
          <option value="missed">Missed &mdash; Could not collect</option>
          <option value="rescheduled">Rescheduled</option>
          <option value="blocked_access">Blocked Access</option>
        </select>
      </div>
      <div class="form-group" id="missedReasonGroup" style="display:none">
        <label class="form-label">Reason for Missing *</label>
        <select class="form-control" id="missedReason">
          <option value="blocked_access">Blocked access</option>
          <option value="no_bin_out">Bin not placed out</option>
          <option value="customer_not_home">Customer not home</option>
          <option value="road_issue">Road issue</option>
          <option value="truck_breakdown">Truck breakdown</option>
          <option value="other">Other</option>
        </select>
      </div>
      <div class="form-group" id="rescheduleGroup" style="display:none">
        <label class="form-label">Reschedule Date</label>
        <input type="datetime-local" class="form-control" id="rescheduleDate" />
      </div>
      <div class="form-group">
        <label class="form-label">Notes (Optional)</label>
        <textarea class="form-control" id="collectionNotes" rows="2" placeholder="Additional notes..."></textarea>
      </div>
      <div class="form-group">
        <label class="form-label">Evidence Photo (Optional)</label>
        <label style="display:flex;align-items:center;gap:0.5rem;padding:0.75rem;border:1.5px dashed #e2e8f0;border-radius:10px;cursor:pointer">
          <i class="fas fa-camera" style="color:#94a3b8"></i>
          <span id="photoLabel" style="font-size:0.875rem;color:#64748b">Take/Upload Photo</span>
          <input type="file" id="evidencePhoto" accept="image/*" capture="environment" style="display:none" onchange="previewPhoto(this)" />
        </label>
        <img id="photoPreview" src="" style="display:none;width:100%;max-height:150px;object-fit:contain;border-radius:8px;margin-top:0.5rem" />
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeStatusModal()">Cancel</button>
      <button class="btn btn-primary" id="updateStatusBtn" onclick="submitStatus()">
        <i class="fas fa-check"></i> Update Status
      </button>
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="/js/bootstrap.js?v=1"></script>
<script src="/js/api.js?v=7"></script>
<script src="/js/utils.js?v=7"></script>
<script>
  const user = requireAuth(['driver']);
  if (!user) throw new Error("Not authenticated"); // requireAuth already redirected

  initSidebar(); initTheme(); populateSidebarUser(user);
  document.getElementById('welcomeMsg').textContent = `Good ${getGreeting()}, ${user.fullName.split(' ')[0]}!`;
  document.getElementById('todayDate').textContent = new Intl.DateTimeFormat('en-GH', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' }).format(new Date());

  function getGreeting() {
    const h = new Date().getHours();
    return h < 12 ? 'morning' : h < 17 ? 'afternoon' : 'evening';
  }

  let allCollections = [];
  let selectedCollectionId = null;
  let routeMap = null;

  const loadDashboard = async () => {
    try {
      const { data } = await api.getDriverDashboard();
      const { stats, driver, pendingToday } = data;

      document.getElementById('statsGrid').innerHTML = `
        <div class="stat-card">
          <div class="stat-icon green"><i class="fas fa-check-circle"></i></div>
          <div class="stat-info">
            <div class="stat-value">${stats.todayCompleted}</div>
            <div class="stat-label">Collected Today</div>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon yellow"><i class="fas fa-clock"></i></div>
          <div class="stat-info">
            <div class="stat-value">${stats.todayPending}</div>
            <div class="stat-label">Pending Today</div>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon blue"><i class="fas fa-users"></i></div>
          <div class="stat-info">
            <div class="stat-value">${stats.assignedCustomers}</div>
            <div class="stat-label">My Customers</div>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon green"><i class="fas fa-chart-line"></i></div>
          <div class="stat-info">
            <div class="stat-value">${stats.performanceRate}%</div>
            <div class="stat-label">Monthly Rate</div>
          </div>
        </div>
      `;

      // Progress
      const total = stats.todayCollections;
      const done = stats.todayCompleted;
      const pct = total > 0 ? Math.round((done / total) * 100) : 0;
      document.getElementById('progressText').textContent = `${done} / ${total} completed`;
      document.getElementById('progressFill').style.width = `${pct}%`;

      allCollections = pendingToday || [];
      renderCollections(allCollections);
      initRouteMap(allCollections);

    } catch (err) {
      Toast.error('Error', err.message);
    }
  };

  const renderCollections = (collections) => {
    const grid = document.getElementById('collectionsGrid');
    if (!collections.length) {
      grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><div class="empty-icon"><i class="fas fa-truck"></i></div><div class="empty-title">No collections for today</div><div class="empty-subtitle">Check back later or view all collections</div></div>`;
      return;
    }
    grid.innerHTML = collections.map((c) => {
      const name = c.customer?.user?.fullName || 'Unknown';
      const phone = c.customer?.user?.phone || '';
      const addr = c.customer?.residentialAddress || 'No address';
      return `
        <div class="collection-card status-${c.status}">
          <div class="customer-info">
            <div class="avatar avatar-sm">${getInitials(name)}</div>
            <div style="flex:1;min-width:0">
              <div style="font-weight:600;font-size:0.875rem">${name}</div>
              <div class="addr-text" title="${addr}">${addr}</div>
            </div>
            ${statusBadge(c.status)}
          </div>
          <div style="font-size:0.8rem;color:#64748b;margin-bottom:0.75rem">
            <i class="fas fa-phone" style="color:#16a34a;width:14px"></i> ${phone}
            &nbsp;&bull;&nbsp; ${timeAgo(c.scheduledDate)}
          </div>
          <div class="action-btns">
            ${c.status === 'scheduled' ? `
              <button class="btn btn-sm btn-primary" onclick="openStatusModal('${c._id}', '${name}', '${addr}')">
                <i class="fas fa-check"></i> Update
              </button>
              <a href="tel:${phone}" class="btn btn-sm btn-outline">
                <i class="fas fa-phone"></i> Call
              </a>
              <a href="https://www.google.com/maps/dir/?api=1&destination=${c.customer?.location?.coordinates?.[1]},${c.customer?.location?.coordinates?.[0]}" target="_blank" class="btn btn-sm btn-secondary">
                <i class="fas fa-directions"></i>
              </a>
            ` : `<span style="font-size:0.8rem;color:#64748b">${c.collectedAt ? `Completed at ${formatDateTime(c.collectedAt)}` : (c.notes || '')}</span>`}
          </div>
        </div>
      `;
    }).join('');
  };

  const filterCollections = () => {
    const statusFilter = document.getElementById('statusFilterDriver').value;
    const filtered = statusFilter ? allCollections.filter((c) => c.status === statusFilter) : allCollections;
    renderCollections(filtered);
  };

  const initRouteMap = (collections) => {
    if (routeMap) routeMap.remove();
    routeMap = L.map('routeMap').setView([5.6037, -0.1870], 12);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: 'Â© OpenStreetMap' }).addTo(routeMap);

    collections.forEach((c, i) => {
      const coords = c.customer?.location?.coordinates;
      if (!coords || coords[0] === 0) return;
      const [lng, lat] = coords;
      const color = c.status === 'picked' ? '#16a34a' : c.status === 'missed' ? '#ef4444' : '#eab308';
      const icon = L.divIcon({
        className: '',
        html: `<div style="background:${color};width:28px;height:28px;border-radius:50%;border:3px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,0.3);display:flex;align-items:center;justify-content:center;color:#fff;font-size:0.7rem;font-weight:700">${i + 1}</div>`,
        iconSize: [28, 28],
        iconAnchor: [14, 14],
      });
      L.marker([lat, lng], { icon })
        .addTo(routeMap)
        .bindPopup(`<b>${c.customer?.user?.fullName}</b><br>${c.customer?.residentialAddress}`);
    });
  };

  // Modal
  const openStatusModal = (id, name, addr) => {
    selectedCollectionId = id;
    document.getElementById('statusCustomerInfo').innerHTML = `
      <div style="font-weight:700">${name}</div>
      <div style="color:#64748b;margin-top:0.25rem"><i class="fas fa-map-marker-alt" style="color:#16a34a"></i> ${addr}</div>
    `;
    document.getElementById('newStatus').value = 'picked';
    document.getElementById('collectionNotes').value = '';
    document.getElementById('photoPreview').style.display = 'none';
    document.getElementById('photoLabel').textContent = 'Take/Upload Photo';
    toggleMissedReason();
    document.getElementById('statusModal').classList.add('open');
  };

  const closeStatusModal = () => {
    document.getElementById('statusModal').classList.remove('open');
    selectedCollectionId = null;
  };

  document.getElementById('newStatus').addEventListener('change', toggleMissedReason);

  function toggleMissedReason() {
    const status = document.getElementById('newStatus').value;
    document.getElementById('missedReasonGroup').style.display = ['missed', 'blocked_access'].includes(status) ? 'block' : 'none';
    document.getElementById('rescheduleGroup').style.display = status === 'rescheduled' ? 'block' : 'none';
  }

  function previewPhoto(input) {
    const file = input.files[0];
    if (file) {
      document.getElementById('photoLabel').textContent = file.name;
      const reader = new FileReader();
      reader.onload = (e) => {
        const prev = document.getElementById('photoPreview');
        prev.src = e.target.result;
        prev.style.display = 'block';
      };
      reader.readAsDataURL(file);
    }
  }

  const submitStatus = async () => {
    if (!selectedCollectionId) return;
    const btn = document.getElementById('updateStatusBtn');
    setButtonLoading(btn, true, 'Updating...');

    try {
      const formData = new FormData();
      formData.append('status', document.getElementById('newStatus').value);
      formData.append('notes', document.getElementById('collectionNotes').value);
      const status = document.getElementById('newStatus').value;
      if (['missed', 'blocked_access'].includes(status)) {
        formData.append('missedReason', document.getElementById('missedReason').value);
      }
      if (status === 'rescheduled') {
        formData.append('rescheduleDate', document.getElementById('rescheduleDate').value);
      }

      // Location &mdash; await geolocation before sending
      await new Promise((resolve) => {
        if (navigator.geolocation) {
          navigator.geolocation.getCurrentPosition(
            (pos) => {
              formData.append('latitude', pos.coords.latitude);
              formData.append('longitude', pos.coords.longitude);
              resolve();
            },
            () => resolve(),
            { timeout: 5000 }
          );
        } else { resolve(); }
      });

      const photoFile = document.getElementById('evidencePhoto').files[0];
      if (photoFile) formData.append('evidencePhoto', photoFile);

      await api.updateCollectionStatus(selectedCollectionId, formData);
      Toast.success('Updated!', 'Collection status updated and customer notified');
      closeStatusModal();
      loadDashboard();
    } catch (err) {
      Toast.error('Error', err.message);
    } finally {
      setButtonLoading(btn, false);
    }
  };

  const shareLocation = () => {
    if (!navigator.geolocation) return Toast.error('Error', 'Geolocation not supported');
    navigator.geolocation.getCurrentPosition(async (pos) => {
      try {
        await api.updateDriverLocation({ latitude: pos.coords.latitude, longitude: pos.coords.longitude });
        Toast.success('Location shared', 'Your location has been updated');
      } catch (err) {
        Toast.error('Error', err.message);
      }
    });
  };

  loadDashboard();
</script>
</body>
</html>
