<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/logo/Arkoh logo.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Collections | Driver Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="stylesheet" href="/css/dashboard.css?v=7" />
  <style>
    .collection-card { background:var(--white);border:1px solid var(--gray-200);border-radius:var(--radius);padding:1rem;transition:all var(--transition); }
    .collection-card.status-picked { border-left:4px solid var(--green-500); }
    .collection-card.status-missed { border-left:4px solid var(--red-500); }
    .collection-card.status-scheduled { border-left:4px solid var(--yellow-500); }
    .collections-grid { display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:1rem; }
  </style>
  <script>document.documentElement.setAttribute('data-theme', localStorage.getItem('wm_theme') || 'light');</script>
</head>
<body>
<div class="dashboard-wrapper">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <a href="/driver/dashboard.html" class="sidebar-logo"><img src="/logo/Arkoh logo.png" alt="035 F Arkoh Waste Management" class="sidebar-logo-img" /></a>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section">
        <div class="nav-section-title">Main</div>
        <a href="/driver/dashboard.html" class="nav-item"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
        <a href="/driver/collections.html" class="nav-item active"><i class="fas fa-truck"></i> All Collections</a>
        <a href="/driver/customers.html" class="nav-item"><i class="fas fa-users"></i> My Customers</a>
      </div>
      <div class="nav-section">
        <div class="nav-section-title">Account</div>
        <a href="/driver/profile.html" class="nav-item"><i class="fas fa-user-circle"></i> Profile</a>
      </div>
    </nav>
    <div class="sidebar-footer">
      <div class="user-info">
        <div class="user-avatar" id="sidebarAvatar">D</div>
        <div class="user-details"><div class="user-name" id="sidebarName">Driver</div><div class="user-role">Driver</div></div>
        <button class="logout-btn" onclick="doLogout()"><i class="fas fa-sign-out-alt"></i></button>
      </div>
    </div>
  </aside>

  <main class="main-content">
    <header class="topbar">
      <button class="topbar-btn sidebar-toggle" id="sidebarToggle"><i class="fas fa-bars"></i></button>
      <span class="topbar-title">My Collections</span>
      <div class="topbar-actions"><button class="topbar-btn" data-theme-toggle><i class="fas fa-moon"></i></button></div>
    </header>

    <div class="page-content">
      <div class="page-header">
        <div><h1>Collections</h1><p id="totalCount">Loading...</p></div>
      </div>

      <div class="filter-bar" style="margin-bottom:1rem">
        <select class="form-control" id="statusFilter" style="width:140px" onchange="loadCollections(1)">
          <option value="scheduled">Scheduled</option>
          <option value="">All Status</option>
          <option value="picked">Picked</option>
          <option value="missed">Missed</option>
        </select>
        <input type="date" class="form-control" id="dateFilter" style="width:160px" onchange="loadCollections(1)" />
        <button class="btn btn-outline" onclick="clearFilters()"><i class="fas fa-times"></i> Clear</button>
      </div>

      <div id="collectionsGrid" class="collections-grid">
        <div class="skeleton" style="height:160px;border-radius:12px"></div>
        <div class="skeleton" style="height:160px;border-radius:12px"></div>
        <div class="skeleton" style="height:160px;border-radius:12px"></div>
      </div>
      <div id="paginationContainer" style="margin-top:1rem"></div>
    </div>
  </main>
</div>

<!-- Update Status Modal -->
<div class="modal-overlay" id="statusModal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modalCustomerName">Update Collection</span>
      <button class="modal-close" onclick="closeModal('statusModal')"><i class="fas fa-times"></i></button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">Status *</label>
        <select class="form-control" id="newStatus" onchange="toggleStatusFields()">
          <option value="picked">Picked (Completed)</option>
          <option value="missed">Missed</option>
          <option value="in_progress">In Progress</option>
        </select>
      </div>
      <div id="missedFields" style="display:none">
        <div class="form-group">
          <label class="form-label">Reason for Missing</label>
          <select class="form-control" id="missedReason">
            <option value="not_home">Customer not home</option>
            <option value="bin_not_out">Bin not placed outside</option>
            <option value="access_denied">Access denied</option>
            <option value="vehicle_breakdown">Vehicle breakdown</option>
            <option value="other">Other</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Reschedule Date (Optional)</label>
          <input type="date" class="form-control" id="rescheduleDate" />
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Evidence Photo (Optional)</label>
        <input type="file" class="form-control" id="evidencePhoto" accept="image/*" capture="environment" />
      </div>
      <div class="form-group">
        <label class="form-label">Notes (Optional)</label>
        <textarea class="form-control" id="statusNotes" rows="2" placeholder="Any additional notes..."></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('statusModal')">Cancel</button>
      <button class="btn btn-primary" id="updateBtn" onclick="updateStatus()">
        <i class="fas fa-check"></i> Update Status
      </button>
    </div>
  </div>
</div>

<script src="/js/bootstrap.js?v=1"></script>
<script src="/js/api.js?v=7"></script>
<script src="/js/utils.js?v=7"></script>
<script>
  const user = requireAuth(['driver']);
  if (!user) throw new Error("Not authenticated"); // requireAuth already redirected
  initSidebar(); initTheme(); populateSidebarUser(user);

  document.getElementById('dateFilter').valueAsDate = new Date();
  let activeCollectionId = null;

  const loadCollections = async (page = 1) => {
    const status = document.getElementById('statusFilter').value;
    const date = document.getElementById('dateFilter').value;
    let params = `?page=${page}&limit=20`;
    if (status) params += `&status=${status}`;
    if (date) params += `&date=${date}`;

    try {
      const res = await api.getDriverCollections(params);
      const { data, pagination } = res;
      document.getElementById('totalCount').textContent = `${pagination.total} collections`;

      const grid = document.getElementById('collectionsGrid');
      if (!data?.length) {
        grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><div class="empty-icon"><i class="fas fa-truck"></i></div><div class="empty-title">No collections found</div></div>`;
        document.getElementById('paginationContainer').innerHTML = '';
        return;
      }

      grid.innerHTML = data.map((c) => {
        const customer = c.customer;
        const name = customer?.user?.fullName || 'Unknown';
        const phone = customer?.user?.phone || '';
        const addr = customer?.residentialAddress || '';
        const canUpdate = c.status !== 'picked';
        return `
          <div class="collection-card status-${c.status}">
            <div style="display:flex;justify-content:space-between;margin-bottom:0.5rem">
              <div style="font-weight:600;font-size:0.9rem">${name}</div>
              ${statusBadge(c.status)}
            </div>
            <div style="font-size:0.8rem;color:#64748b;margin-bottom:0.25rem"><i class="fas fa-map-marker-alt" style="color:#16a34a;margin-right:0.3rem"></i>${addr || 'No address'}</div>
            <div style="font-size:0.8rem;color:#64748b;margin-bottom:0.75rem"><i class="fas fa-phone" style="color:#3b82f6;margin-right:0.3rem"></i>${phone || '&mdash;'}</div>
            <div style="font-size:0.75rem;color:#94a3b8;margin-bottom:0.75rem">Scheduled: ${formatDate(c.scheduledDate)}</div>
            <div style="display:flex;gap:0.4rem">
              ${canUpdate ? `<button class="btn btn-sm btn-primary" onclick="openStatusModal('${c._id}','${name}')"><i class="fas fa-edit"></i> Update</button>` : ''}
              ${phone ? `<a href="tel:${phone}" class="btn btn-sm btn-outline"><i class="fas fa-phone"></i></a>` : ''}
              ${c.evidencePhoto ? `<a href="${c.evidencePhoto}" target="_blank" class="btn btn-sm btn-outline"><i class="fas fa-image"></i></a>` : ''}
            </div>
          </div>
        `;
      }).join('');

      const pc = document.getElementById('paginationContainer');
      pc.innerHTML = '';
      if (pagination.pages > 1) pc.appendChild(renderPagination(pagination, loadCollections));
    } catch (err) {
      Toast.error('Error', err.message);
    }
  };

  const openStatusModal = (id, name) => {
    activeCollectionId = id;
    document.getElementById('modalCustomerName').textContent = name;
    document.getElementById('newStatus').value = 'picked';
    document.getElementById('statusNotes').value = '';
    document.getElementById('evidencePhoto').value = '';
    toggleStatusFields();
    document.getElementById('statusModal').classList.add('open');
  };

  const toggleStatusFields = () => {
    const missed = document.getElementById('newStatus').value === 'missed';
    document.getElementById('missedFields').style.display = missed ? 'block' : 'none';
  };

  const updateStatus = async () => {
    if (!activeCollectionId) return;
    const status = document.getElementById('newStatus').value;
    const notes = document.getElementById('statusNotes').value.trim();
    const missedReason = document.getElementById('missedReason').value;
    const rescheduleDate = document.getElementById('rescheduleDate').value;
    const photoFile = document.getElementById('evidencePhoto').files[0];

    const btn = document.getElementById('updateBtn');
    setButtonLoading(btn, true, 'Updating...');

    try {
      const formData = new FormData();
      formData.append('status', status);
      if (notes) formData.append('notes', notes);
      if (status === 'missed') {
        formData.append('missedReason', missedReason);
        if (rescheduleDate) formData.append('rescheduleDate', rescheduleDate);
      }
      if (photoFile) formData.append('evidencePhoto', photoFile);

      if (navigator.geolocation) {
        await new Promise((resolve) => {
          navigator.geolocation.getCurrentPosition((pos) => {
            formData.append('latitude', pos.coords.latitude);
            formData.append('longitude', pos.coords.longitude);
            resolve();
          }, resolve, { timeout: 3000 });
        });
      }

      await api.updateCollectionStatus(activeCollectionId, formData);
      Toast.success('Updated', `Collection marked as ${status}`);
      closeModal('statusModal');
      loadCollections(1);
    } catch (err) {
      Toast.error('Error', err.message);
    } finally {
      setButtonLoading(btn, false);
    }
  };

  const clearFilters = () => {
    document.getElementById('statusFilter').value = '';
    document.getElementById('dateFilter').value = '';
    loadCollections(1);
  };


  document.querySelectorAll('.modal-overlay').forEach((o) => o.addEventListener('click', (e) => { if (e.target === o) o.classList.remove('open'); }));

  loadCollections(1);
</script>
</body>
</html>
