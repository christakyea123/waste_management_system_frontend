﻿<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/logo/Arkoh logo.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Collections | 035 F Arkoh Waste Management</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="stylesheet" href="/css/dashboard.css?v=7" />
  <script>document.documentElement.setAttribute('data-theme', localStorage.getItem('wm_theme') || 'light');</script>
</head>
<body>
<div class="dashboard-wrapper">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <a href="/customer/dashboard.html" class="sidebar-logo"><img src="/logo/Arkoh logo.png" alt="035 F Arkoh Waste Management" class="sidebar-logo-img" /></a>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section">
        <div class="nav-section-title">Main</div>
        <a href="/customer/dashboard.html" class="nav-item"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
        <a href="/customer/collections.html" class="nav-item active"><i class="fas fa-truck"></i> Collections</a>
        <a href="/customer/invoices.html" class="nav-item"><i class="fas fa-file-invoice"></i> Invoices</a>
        <a href="/customer/payments.html" class="nav-item"><i class="fas fa-credit-card"></i> Payments</a>
      </div>
      <div class="nav-section">
        <div class="nav-section-title">Account</div>
        <a href="/customer/notifications.html" class="nav-item"><i class="fas fa-bell"></i> Notifications</a>
        <a href="/customer/complaints.html" class="nav-item"><i class="fas fa-comment-alt"></i> Complaints</a>
        <a href="/customer/profile.html" class="nav-item"><i class="fas fa-user-circle"></i> Profile</a>
      </div>
    </nav>
    <div class="sidebar-footer">
      <div class="user-info">
        <div class="user-avatar" id="sidebarAvatar">?</div>
        <div class="user-details"><div class="user-name" id="sidebarName">Loading...</div><div class="user-role">Customer</div></div>
        <button class="logout-btn" onclick="doLogout()"><i class="fas fa-sign-out-alt"></i></button>
      </div>
    </div>
  </aside>

  <main class="main-content">
    <header class="topbar">
      <button class="topbar-btn sidebar-toggle" id="sidebarToggle"><i class="fas fa-bars"></i></button>
      <span class="topbar-title">My Collections</span>
      <div class="topbar-actions"><button class="topbar-btn" data-theme-toggle><i class="fas fa-moon"></i></button></div>
    </header>

    <div class="page-content">
      <div class="page-header">
        <div><h1>Collections</h1><p>View your waste collection history and schedule</p></div>
      </div>

      <div class="filter-bar" style="margin-bottom:1rem">
        <select class="form-control" id="statusFilter" style="width:140px" onchange="loadCollections(1)">
          <option value="">All Status</option>
          <option value="scheduled">Scheduled</option>
          <option value="picked">Picked</option>
          <option value="missed">Missed</option>
        </select>
        <select class="form-control" id="monthFilter" style="width:130px">
          <option value="">All Months</option>
        </select>
        <button class="btn btn-secondary" onclick="loadCollections(1)"><i class="fas fa-filter"></i> Filter</button>
      </div>

      <div class="card">
        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>Scheduled Date</th>
                <th>Status</th>
                <th>Driver</th>
                <th>Completed At</th>
                <th>Notes</th>
                <th>Evidence</th>
              </tr>
            </thead>
            <tbody id="collectionsTable">
              <tr><td colspan="6"><div class="skeleton" style="height:40px;margin:0.5rem 1rem"></div></td></tr>
            </tbody>
          </table>
        </div>
        <div class="card-footer" id="paginationContainer"></div>
      </div>
    </div>
  </main>
</div>

<script src="/js/bootstrap.js?v=1"></script>
<script src="/js/api.js?v=11"></script>
<script src="/js/utils.js?v=7"></script>
<script>
  const user = requireAuth(['customer']);
  if (!user) throw new Error("Not authenticated"); // requireAuth already redirected
  initSidebar(); initTheme(); populateSidebarUser(user);

  // Populate month filter
  const monthSel = document.getElementById('monthFilter');
  ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'].forEach((m, i) => {
    const opt = document.createElement('option');
    opt.value = i + 1;
    opt.textContent = m;
    monthSel.appendChild(opt);
  });
  monthSel.value = new Date().getMonth() + 1;

  const loadCollections = async (page = 1) => {
    const status = document.getElementById('statusFilter').value;
    const month = document.getElementById('monthFilter').value;
    let params = `?page=${page}&limit=20`;
    if (status) params += `&status=${status}`;
    if (month) params += `&month=${month}`;

    try {
      const res = await api.getMyCollections(params);
      const { data, pagination } = res;
      const tbody = document.getElementById('collectionsTable');

      if (!data?.length) {
        tbody.innerHTML = `<tr><td colspan="6"><div class="empty-state"><div class="empty-icon"><i class="fas fa-truck"></i></div><div class="empty-title">No collections found</div></div></td></tr>`;
        document.getElementById('paginationContainer').innerHTML = '';
        return;
      }

      tbody.innerHTML = data.map((c) => `
        <tr>
          <td>${formatDate(c.scheduledDate)}</td>
          <td>${statusBadge(c.status)}</td>
          <td>${c.driver?.user?.fullName || 'N/A'}</td>
          <td>${c.collectedAt ? formatDate(c.collectedAt) : '&mdash;'}</td>
          <td style="max-width:160px;white-space:normal">${c.notes || c.missedReason?.replace(/_/g,' ') || '&mdash;'}</td>
          <td>${c.evidencePhoto
            ? `<a href="${c.evidencePhoto}" target="_blank" class="btn btn-sm btn-outline"><i class="fas fa-image"></i></a>`
            : '&mdash;'}</td>
        </tr>
      `).join('');

      const pc = document.getElementById('paginationContainer');
      pc.innerHTML = '';
      if (pagination.pages > 1) pc.appendChild(renderPagination(pagination, loadCollections));
    } catch (err) {
      Toast.error('Error', err.message);
    }
  };

  loadCollections(1);
</script>
</body>
</html>
