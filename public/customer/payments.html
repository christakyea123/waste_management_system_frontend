﻿<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/logo/Arkoh logo.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payments | 035 F Arkoh Waste Management</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="stylesheet" href="/css/dashboard.css?v=7" />
  <script>document.documentElement.setAttribute('data-theme', localStorage.getItem('wm_theme') || 'light');</script>
</head>
<body>
<div class="dashboard-wrapper">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <a href="/customer/dashboard.html" class="sidebar-logo"><img src="/logo/Arkoh logo.png" alt="035 F Arkoh Waste Management" class="sidebar-logo-img" /></a>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section">
        <div class="nav-section-title">Main</div>
        <a href="/customer/dashboard.html" class="nav-item"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
        <a href="/customer/collections.html" class="nav-item"><i class="fas fa-truck"></i> Collections</a>
        <a href="/customer/invoices.html" class="nav-item"><i class="fas fa-file-invoice"></i> Invoices</a>
        <a href="/customer/payments.html" class="nav-item active"><i class="fas fa-credit-card"></i> Payments</a>
      </div>
      <div class="nav-section">
        <div class="nav-section-title">Account</div>
        <a href="/customer/notifications.html" class="nav-item"><i class="fas fa-bell"></i> Notifications</a>
        <a href="/customer/complaints.html" class="nav-item"><i class="fas fa-comment-alt"></i> Complaints</a>
        <a href="/customer/profile.html" class="nav-item"><i class="fas fa-user-circle"></i> Profile</a>
      </div>
    </nav>
    <div class="sidebar-footer">
      <div class="user-info">
        <div class="user-avatar" id="sidebarAvatar">?</div>
        <div class="user-details"><div class="user-name" id="sidebarName">Loading...</div><div class="user-role">Customer</div></div>
        <button class="logout-btn" onclick="doLogout()"><i class="fas fa-sign-out-alt"></i></button>
      </div>
    </div>
  </aside>

  <main class="main-content">
    <header class="topbar">
      <button class="topbar-btn sidebar-toggle" id="sidebarToggle"><i class="fas fa-bars"></i></button>
      <span class="topbar-title">Payment History</span>
      <div class="topbar-actions"><button class="topbar-btn" data-theme-toggle><i class="fas fa-moon"></i></button></div>
    </header>

    <div class="page-content">
      <div class="page-header">
        <div><h1>Payments</h1><p>Your complete payment history</p></div>
        <a href="/customer/invoices.html" class="btn btn-primary"><i class="fas fa-credit-card"></i> Pay Invoice</a>
      </div>

      <!-- Summary -->
      <div class="stats-grid" id="paymentSummary" style="margin-bottom:1.5rem">
        <div class="stat-card"><div class="skeleton" style="height:70px"></div></div>
        <div class="stat-card"><div class="skeleton" style="height:70px"></div></div>
      </div>

      <div class="card">
        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>Reference</th>
                <th>Invoice</th>
                <th>Amount</th>
                <th>Channel</th>
                <th>Paid At</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody id="paymentsTable">
              <tr><td colspan="6"><div class="skeleton" style="height:40px;margin:0.5rem 1rem"></div></td></tr>
            </tbody>
          </table>
        </div>
        <div class="card-footer" id="paginationContainer"></div>
      </div>
    </div>
  </main>
</div>

<script src="/js/bootstrap.js?v=1"></script>
<script src="/js/api.js?v=9"></script>
<script src="/js/utils.js?v=7"></script>
<script>
  const user = requireAuth(['customer']);
  if (!user) throw new Error("Not authenticated"); // requireAuth already redirected
  initSidebar(); initTheme(); populateSidebarUser(user);

  const loadPayments = async (page = 1) => {
    try {
      const res = await api.getMyPayments(`?page=${page}&limit=20`);
      const { data, pagination } = res;

      // Summary totals
      const total = data.reduce((s, p) => s + (p.amount || 0), 0);
      document.getElementById('paymentSummary').innerHTML = `
        <div class="stat-card">
          <div class="stat-icon green"><i class="fas fa-money-bill-wave"></i></div>
          <div class="stat-info"><div class="stat-value">${formatCurrency(total)}</div><div class="stat-label">Paid This Page</div></div>
        </div>
        <div class="stat-card">
          <div class="stat-icon blue"><i class="fas fa-receipt"></i></div>
          <div class="stat-info"><div class="stat-value">${pagination.total}</div><div class="stat-label">Total Payments</div></div>
        </div>
      `;

      const tbody = document.getElementById('paymentsTable');
      if (!data?.length) {
        tbody.innerHTML = `<tr><td colspan="6"><div class="empty-state"><div class="empty-icon"><i class="fas fa-credit-card"></i></div><div class="empty-title">No payments yet</div><div class="empty-subtitle"><a href="/customer/invoices.html" class="btn btn-primary btn-sm">Pay an Invoice</a></div></div></td></tr>`;
        document.getElementById('paginationContainer').innerHTML = '';
        return;
      }

      tbody.innerHTML = data.map((p) => `
        <tr>
          <td style="font-size:0.8rem;font-family:monospace">${p.paystackReference || '&mdash;'}</td>
          <td>${p.invoice?.invoiceNumber || '&mdash;'}<br><small style="color:#64748b">${p.invoice ? `${monthNames[(p.invoice.month||1)-1]} ${p.invoice.year}` : ''}</small></td>
          <td><strong>${formatCurrency(p.amount)}</strong></td>
          <td><span style="text-transform:capitalize">${p.channel || '&mdash;'}</span></td>
          <td>${formatDate(p.paidAt)}</td>
          <td>${statusBadge(p.status)}</td>
        </tr>
      `).join('');

      const pc = document.getElementById('paginationContainer');
      pc.innerHTML = '';
      if (pagination.pages > 1) pc.appendChild(renderPagination(pagination, loadPayments));
    } catch (err) {
      Toast.error('Error', err.message);
    }
  };

  loadPayments(1);
</script>
</body>
</html>
