<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/logo/Arkoh logo.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payment Status | 035 F Arkoh Waste Management</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { font-family: 'Inter', sans-serif; color: #0f172a; }
    body {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      padding: 2rem 1rem;
      background: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 100%);
    }
    .card {
      background: #fff; border-radius: 18px; padding: 2.5rem 2rem; max-width: 460px; width: 100%;
      box-shadow: 0 12px 40px rgba(0,0,0,0.08); text-align: center;
    }
    .logo { height: 56px; margin-bottom: 1.25rem; }
    .icon-circle {
      width: 84px; height: 84px; border-radius: 50%;
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 2.25rem; margin: 0 auto 1.25rem;
    }
    .icon-circle.success { background: #dcfce7; color: #15803d; }
    .icon-circle.error   { background: #fee2e2; color: #b91c1c; }
    .icon-circle.pending { background: #fef9c3; color: #a16207; }
    h1 { font-size: 1.4rem; margin-bottom: 0.5rem; }
    p.lead { color: #64748b; margin-bottom: 1.25rem; font-size: 0.95rem; }
    .meta {
      background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 10px;
      padding: 0.85rem 1rem; font-size: 0.85rem; color: #334155;
      text-align: left; margin-bottom: 1.5rem;
    }
    .meta div { display: flex; justify-content: space-between; padding: 0.2rem 0; }
    .meta strong { color: #0f172a; }
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 0.5rem;
      padding: 0.75rem 1.5rem; border-radius: 10px; border: 1.5px solid transparent;
      font-family: inherit; font-size: 0.92rem; font-weight: 600; cursor: pointer;
      text-decoration: none; width: 100%;
    }
    .btn-primary { background: linear-gradient(135deg, #16a34a, #15803d); color: #fff; }
    .btn-outline { background: transparent; color: #334155; border-color: #e2e8f0; margin-top: 0.5rem; }
    .spinner { animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card">
    <img src="/logo/Arkoh logo.png" alt="" class="logo" />
    <div id="iconHost" class="icon-circle pending">
      <i class="fas fa-spinner spinner"></i>
    </div>
    <h1 id="titleEl">Verifying your payment…</h1>
    <p class="lead" id="leadEl">Please hold on while we confirm this with Paystack. Do not close this tab.</p>
    <div class="meta" id="metaEl" style="display:none"></div>
    <a href="/customer/dashboard.html" class="btn btn-primary" id="continueBtn" style="display:none">
      <i class="fas fa-arrow-right"></i> Continue to Dashboard
    </a>
    <a href="/customer/invoices.html" class="btn btn-outline" id="invoicesBtn" style="display:none">
      View Invoices
    </a>
  </div>

<script src="/js/api.js?v=9"></script>
<script>
  // The customer just returned from Paystack. We must:
  //   1) read ?reference / ?trxref from the URL
  //   2) call the protected /verify endpoint (the server is the source of truth —
  //      it re-asks Paystack and atomically flips the local record)
  //   3) render the result clearly so the user is never left wondering whether the
  //      payment went through (this page replaces the silent 404 that used to send
  //      the user back to a stale dashboard).
  const params = new URLSearchParams(window.location.search);
  const reference = params.get('reference') || params.get('trxref');

  const iconHost = document.getElementById('iconHost');
  const titleEl  = document.getElementById('titleEl');
  const leadEl   = document.getElementById('leadEl');
  const metaEl   = document.getElementById('metaEl');
  const continueBtn = document.getElementById('continueBtn');
  const invoicesBtn = document.getElementById('invoicesBtn');

  const fmtAmount = (n) => new Intl.NumberFormat('en-GH', { style: 'currency', currency: 'GHS' }).format(n || 0);

  const renderSuccess = (payment) => {
    iconHost.className = 'icon-circle success';
    iconHost.innerHTML = '<i class="fas fa-check"></i>';
    titleEl.textContent = 'Payment successful';
    leadEl.textContent  = 'Thanks! Your invoice has been marked as paid.';
    metaEl.style.display = 'block';
    metaEl.innerHTML = `
      <div><span>Reference</span><strong style="font-family:monospace">${payment.paystackReference || reference}</strong></div>
      <div><span>Amount</span><strong>${fmtAmount(payment.amount)}</strong></div>
      ${payment.channel ? `<div><span>Channel</span><strong style="text-transform:capitalize">${payment.channel}</strong></div>` : ''}
    `;
    continueBtn.style.display = 'inline-flex';
    invoicesBtn.style.display = 'inline-flex';
  };

  const renderFailure = (message) => {
    iconHost.className = 'icon-circle error';
    iconHost.innerHTML = '<i class="fas fa-times"></i>';
    titleEl.textContent = 'Payment not completed';
    leadEl.textContent  = message || 'We could not confirm this payment. If money left your account, it will be reversed by Paystack.';
    if (reference) {
      metaEl.style.display = 'block';
      metaEl.innerHTML = `<div><span>Reference</span><strong style="font-family:monospace">${reference}</strong></div>`;
    }
    continueBtn.style.display = 'inline-flex';
    continueBtn.textContent = 'Back to Dashboard';
    invoicesBtn.style.display = 'inline-flex';
  };

  (async () => {
    if (!reference) {
      renderFailure('Missing payment reference in the callback URL.');
      return;
    }
    try {
      const res = await api.verifyPayment(reference);
      // api.request throws on non-2xx, so we can trust we have a result here.
      // The server returns { success: true, data: { payment } } on the success path
      // and { success: false, message } on a known failure path (declined, abandoned).
      if (res && res.success && res.data?.payment?.status === 'success') {
        renderSuccess(res.data.payment);
      } else {
        renderFailure(res?.message);
      }
    } catch (err) {
      renderFailure(err && err.message);
    }
  })();
</script>
</body>
</html>
