<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/logo/Arkoh logo.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Invoices | 035 F Arkoh Waste Management</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="stylesheet" href="/css/dashboard.css?v=7" />
  <script>document.documentElement.setAttribute('data-theme', localStorage.getItem('wm_theme') || 'light');</script>
</head>
<body>
<div class="dashboard-wrapper">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <a href="/customer/dashboard.html" class="sidebar-logo"><img src="/logo/Arkoh logo.png" alt="035 F Arkoh Waste Management" class="sidebar-logo-img" /></a>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section">
        <a href="/customer/dashboard.html" class="nav-item"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
        <a href="/customer/collections.html" class="nav-item"><i class="fas fa-truck"></i> Collections</a>
        <a href="/customer/invoices.html" class="nav-item active"><i class="fas fa-file-invoice"></i> Invoices</a>
        <a href="/customer/payments.html" class="nav-item"><i class="fas fa-credit-card"></i> Payments</a>
        <a href="/customer/notifications.html" class="nav-item"><i class="fas fa-bell"></i> Notifications</a>
        <a href="/customer/complaints.html" class="nav-item"><i class="fas fa-comment-alt"></i> Complaints</a>
        <a href="/customer/profile.html" class="nav-item"><i class="fas fa-user-circle"></i> Profile</a>
      </div>
    </nav>
    <div class="sidebar-footer">
      <div class="user-info">
        <div class="user-avatar" id="sidebarAvatar">?</div>
        <div class="user-details"><div class="user-name" id="sidebarName">Loading...</div><div class="user-role">Customer</div></div>
        <button class="logout-btn" onclick="doLogout()"><i class="fas fa-sign-out-alt"></i></button>
      </div>
    </div>
  </aside>

  <main class="main-content">
    <header class="topbar">
      <button class="topbar-btn sidebar-toggle" id="sidebarToggle"><i class="fas fa-bars"></i></button>
      <span class="topbar-title">My Invoices</span>
      <div class="topbar-actions">
        <button class="topbar-btn" data-theme-toggle><i class="fas fa-moon"></i></button>
      </div>
    </header>

    <div class="page-content">
      <div class="page-header">
        <div><h1>Invoices</h1><p>Manage and pay your monthly invoices</p></div>
      </div>

      <div class="filter-bar" style="margin-bottom:1rem">
        <select class="form-control" id="statusFilter" style="width:140px" onchange="loadInvoices(1)">
          <option value="">All Status</option>
          <option value="pending">Pending</option>
          <option value="paid">Paid</option>
          <option value="overdue">Overdue</option>
        </select>
      </div>

      <div id="invoicesGrid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(min(100%,300px),1fr));gap:1rem">
        <div class="skeleton" style="height:180px;border-radius:12px"></div>
        <div class="skeleton" style="height:180px;border-radius:12px"></div>
      </div>

      <div id="paginationContainer" style="margin-top:1rem"></div>
    </div>
  </main>
</div>

<!-- Payment Modal -->
<div class="modal-overlay" id="payModal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">Pay Invoice</span>
      <button class="modal-close" onclick="closeModal('payModal')"><i class="fas fa-times"></i></button>
    </div>
    <div class="modal-body" id="payModalBody"></div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('payModal')">Cancel</button>
      <button class="btn btn-primary" id="payBtn" onclick="proceedPayment()">
        <i class="fas fa-credit-card"></i> Pay with Paystack
      </button>
    </div>
  </div>
</div>

<script src="/js/bootstrap.js?v=1"></script>
<script src="/js/api.js?v=9"></script>
<script src="/js/utils.js?v=7"></script>
<script>
  const user = requireAuth(['customer']);
  if (!user) throw new Error("Not authenticated"); // requireAuth already redirected
  initSidebar(); initTheme(); populateSidebarUser(user);


  let selectedInvoiceId = null;

  const loadInvoices = async (page = 1) => {
    const status = document.getElementById('statusFilter').value;
    let params = `?page=${page}&limit=12`;
    if (status) params += `&status=${status}`;

    try {
      const res = await api.getMyInvoices(params);
      const { data, pagination } = res;
      const grid = document.getElementById('invoicesGrid');

      if (!data?.length) {
        grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><div class="empty-icon"><i class="fas fa-file-invoice"></i></div><div class="empty-title">No invoices found</div></div>`;
        return;
      }

      grid.innerHTML = data.map((inv) => {
        const isPaid = inv.status === 'paid';
        const isOverdue = inv.status === 'overdue';
        const borderColor = isPaid ? '#16a34a' : isOverdue ? '#ef4444' : '#eab308';
        return `
          <div style="background:#fff;border-radius:12px;border:1px solid #e2e8f0;border-top:4px solid ${borderColor};padding:1.25rem;transition:all 0.2s" onmouseover="this.style.boxShadow='0 4px 16px rgba(0,0,0,0.08)'" onmouseout="this.style.boxShadow=''">
            <div style="display:flex;justify-content:space-between;align-items:start;margin-bottom:0.75rem">
              <div>
                <div style="font-size:0.7rem;color:#94a3b8;font-weight:700;text-transform:uppercase;letter-spacing:0.05em">${monthNames[inv.month - 1]} ${inv.year}</div>
                <div style="font-size:0.8rem;color:#64748b">${inv.invoiceNumber}</div>
              </div>
              ${statusBadge(inv.status)}
            </div>
            <div style="font-size:2rem;font-weight:800;color:#0f172a;margin-bottom:0.5rem">${formatCurrency(inv.totalAmount || inv.amount)}</div>
            <div style="font-size:0.8rem;color:#64748b;margin-bottom:1rem">
              Due: ${formatDate(inv.dueDate)}
              ${isPaid ? `<span style="color:#16a34a;margin-left:0.5rem">&bull; Paid ${formatDate(inv.paidDate)}</span>` : ''}
            </div>
            <div style="display:flex;gap:0.5rem">
              ${!isPaid ? `<button class="btn btn-primary btn-sm" onclick="openPayModal('${inv._id}','${inv.invoiceNumber}','${inv.totalAmount || inv.amount}','${inv.dueDate}')"><i class="fas fa-credit-card"></i> Pay Now</button>` : ''}
              <button class="btn btn-outline btn-sm" onclick="downloadPdf('${inv._id}','${inv.invoiceNumber}')"><i class="fas fa-download"></i> PDF</button>
            </div>
          </div>
        `;
      }).join('');

      const paginationContainer = document.getElementById('paginationContainer');
      paginationContainer.innerHTML = '';
      if (pagination.pages > 1) paginationContainer.appendChild(renderPagination(pagination, loadInvoices));

    } catch (err) {
      Toast.error('Error', err.message);
    }
  };

  const openPayModal = (id, number, amount, dueDate) => {
    selectedInvoiceId = id;
    document.getElementById('payModalBody').innerHTML = `
      <div style="text-align:center;padding:1rem">
        <div style="font-size:2.5rem;font-weight:900;color:#0f172a;margin:0.5rem 0">${formatCurrency(parseFloat(amount))}</div>
        <div style="color:#64748b;font-size:0.9rem">${number}</div>
        <div style="color:#64748b;font-size:0.85rem;margin-top:0.25rem">Due: ${formatDate(dueDate)}</div>
      </div>
      <div style="background:#f0fdf4;border-radius:10px;padding:1rem;text-align:center;margin-top:0.5rem">
        <i class="fas fa-shield-alt" style="color:#16a34a"></i>
        <span style="font-size:0.875rem;color:#15803d;margin-left:0.4rem">Secured by Paystack</span>
        <br><small style="color:#64748b;font-size:0.8rem">Card &bull; Mobile Money &bull; Bank Transfer</small>
      </div>
    `;
    document.getElementById('payModal').classList.add('open');
  };

  const proceedPayment = async () => {
    if (!selectedInvoiceId) return;
    const btn = document.getElementById('payBtn');
    setButtonLoading(btn, true, 'Initializing...');
    try {
      const { data } = await api.initializePayment(selectedInvoiceId);
      // Redirect to Paystack checkout
      window.location.href = data.authorizationUrl;
    } catch (err) {
      Toast.error('Payment Error', err.message);
      setButtonLoading(btn, false);
    }
  };

  const downloadPdf = async (id, number) => {
    try {
      Toast.info('Generating', 'Preparing your invoice PDF...');
      const blob = await api.downloadInvoicePdf(id);
      downloadBlob(blob, `invoice-${number}.pdf`);
    } catch (err) {
      Toast.error('Error', 'Failed to download PDF');
    }
  };


  document.querySelectorAll('.modal-overlay').forEach((o) => o.addEventListener('click', (e) => { if (e.target === o) o.classList.remove('open'); }));

  // Handle payment callback verification
  const ref = new URLSearchParams(window.location.search).get('reference') ||
               new URLSearchParams(window.location.search).get('trxref');
  if (ref) {
    (async () => {
      try {
        const result = await api.verifyPayment(ref);
        if (result.success) Toast.success('Payment Successful!', 'Your invoice has been paid');
        else Toast.error('Payment Failed', result.message);
      } catch (err) {
        Toast.error('Verification Error', err.message);
      }
    })();
  }

  loadInvoices(1);
</script>
</body>
</html>
