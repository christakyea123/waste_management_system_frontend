<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/logo/Arkoh logo.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notifications | 035 F Arkoh Waste Management</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="stylesheet" href="/css/dashboard.css?v=7" />
  <script>document.documentElement.setAttribute('data-theme', localStorage.getItem('wm_theme') || 'light');</script>
</head>
<body>
<div class="dashboard-wrapper">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <a href="/customer/dashboard.html" class="sidebar-logo"><img src="/logo/Arkoh logo.png" alt="035 F Arkoh Waste Management" class="sidebar-logo-img" /></a>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section">
        <div class="nav-section-title">Main</div>
        <a href="/customer/dashboard.html" class="nav-item"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
        <a href="/customer/collections.html" class="nav-item"><i class="fas fa-truck"></i> Collections</a>
        <a href="/customer/invoices.html" class="nav-item"><i class="fas fa-file-invoice"></i> Invoices</a>
        <a href="/customer/payments.html" class="nav-item"><i class="fas fa-credit-card"></i> Payments</a>
      </div>
      <div class="nav-section">
        <div class="nav-section-title">Account</div>
        <a href="/customer/notifications.html" class="nav-item active"><i class="fas fa-bell"></i> Notifications</a>
        <a href="/customer/complaints.html" class="nav-item"><i class="fas fa-comment-alt"></i> Complaints</a>
        <a href="/customer/profile.html" class="nav-item"><i class="fas fa-user-circle"></i> Profile</a>
      </div>
    </nav>
    <div class="sidebar-footer">
      <div class="user-info">
        <div class="user-avatar" id="sidebarAvatar">?</div>
        <div class="user-details"><div class="user-name" id="sidebarName">Loading...</div><div class="user-role">Customer</div></div>
        <button class="logout-btn" onclick="doLogout()"><i class="fas fa-sign-out-alt"></i></button>
      </div>
    </div>
  </aside>

  <main class="main-content">
    <header class="topbar">
      <button class="topbar-btn sidebar-toggle" id="sidebarToggle"><i class="fas fa-bars"></i></button>
      <span class="topbar-title">Notifications</span>
      <div class="topbar-actions"><button class="topbar-btn" data-theme-toggle><i class="fas fa-moon"></i></button></div>
    </header>

    <div class="page-content">
      <div class="page-header">
        <div><h1>Notifications</h1><p>Your alerts and messages</p></div>
        <button class="btn btn-outline" onclick="markAllRead()"><i class="fas fa-check-double"></i> Mark All Read</button>
      </div>

      <div id="notifList" style="display:flex;flex-direction:column;gap:0.75rem">
        <div class="skeleton" style="height:80px;border-radius:12px"></div>
        <div class="skeleton" style="height:80px;border-radius:12px"></div>
        <div class="skeleton" style="height:80px;border-radius:12px"></div>
      </div>
      <div id="paginationContainer" style="margin-top:1rem"></div>
    </div>
  </main>
</div>

<script src="/js/bootstrap.js?v=1"></script>
<script src="/js/api.js?v=11"></script>
<script src="/js/utils.js?v=7"></script>
<script>
  const user = requireAuth(['customer']);
  if (!user) throw new Error("Not authenticated"); // requireAuth already redirected
  initSidebar(); initTheme(); populateSidebarUser(user);

  const notifIcons = {
    payment_success: { icon: 'fa-check-circle', color: '#16a34a' },
    payment_reminder: { icon: 'fa-bell', color: '#eab308' },
    collection_completed: { icon: 'fa-truck', color: '#16a34a' },
    collection_missed: { icon: 'fa-exclamation-triangle', color: '#ef4444' },
    collection_reminder: { icon: 'fa-calendar-check', color: '#3b82f6' },
    invoice_generated: { icon: 'fa-file-invoice', color: '#8b5cf6' },
    account: { icon: 'fa-user', color: '#64748b' },
  };

  const loadNotifications = async (page = 1) => {
    try {
      const res = await api.getMyNotifications(`?page=${page}&limit=20`);
      const { data, pagination } = res;
      const container = document.getElementById('notifList');

      if (!data?.length) {
        container.innerHTML = `<div class="empty-state"><div class="empty-icon"><i class="fas fa-bell-slash"></i></div><div class="empty-title">No notifications</div></div>`;
        return;
      }

      container.innerHTML = data.map((n) => {
        const meta = notifIcons[n.type] || notifIcons.account;
        const unread = !n.isRead;
        return `
          <div id="notif-${n._id}" onclick="markRead('${n._id}', this)"
            style="background:${unread ? 'var(--white)' : 'var(--gray-50)'};border:1px solid ${unread ? '#bfdbfe' : 'var(--gray-200)'};border-radius:12px;padding:1rem 1.25rem;display:flex;gap:1rem;align-items:flex-start;cursor:pointer;transition:all 0.2s">
            <div style="width:42px;height:42px;border-radius:50%;background:${meta.color}22;display:flex;align-items:center;justify-content:center;flex-shrink:0">
              <i class="fas ${meta.icon}" style="color:${meta.color};font-size:1rem"></i>
            </div>
            <div style="flex:1;min-width:0">
              <div style="display:flex;justify-content:space-between;align-items:start">
                <div style="font-weight:${unread ? 700 : 500};font-size:0.875rem">${n.title}</div>
                <div style="font-size:0.75rem;color:#94a3b8;white-space:nowrap;margin-left:1rem">${timeAgo(n.createdAt)}</div>
              </div>
              <div style="font-size:0.825rem;color:#64748b;margin-top:0.2rem">${n.message}</div>
            </div>
            ${unread ? '<div style="width:8px;height:8px;border-radius:50%;background:#3b82f6;flex-shrink:0;margin-top:6px"></div>' : ''}
          </div>
        `;
      }).join('');

      const pc = document.getElementById('paginationContainer');
      pc.innerHTML = '';
      if (pagination.pages > 1) pc.appendChild(renderPagination(pagination, loadNotifications));
    } catch (err) {
      Toast.error('Error', err.message);
    }
  };

  const markRead = async (id, el) => {
    try {
      await api.markNotificationRead(id);
      el.style.background = 'var(--gray-50)';
      el.style.border = '1px solid var(--gray-200)';
      const dot = el.querySelector('[style*="3b82f6"]');
      if (dot && dot.style.width === '8px') dot.remove();
      el.querySelector('div[style*="font-weight"]').style.fontWeight = '500';
    } catch (_) {}
  };

  const markAllRead = async () => {
    const unread = document.querySelectorAll('[id^="notif-"]');
    for (const el of unread) {
      const id = el.id.replace('notif-', '');
      await markRead(id, el).catch(() => {});
    }
    Toast.success('Done', 'All notifications marked as read');
  };

  loadNotifications(1);
</script>
</body>
</html>
