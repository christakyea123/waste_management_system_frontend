      <stop offset="0%" style="stop-color:#16a34a"/>
      <stop offset="100%" style="stop-color:#15803d"/>
    </linearGradient>
  </defs>
  <!-- Green rounded rectangle background -->
  <rect width="220" height="52" rx="10" fill="url(#bg)"/>
