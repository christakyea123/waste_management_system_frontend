  <!-- Company name -->
  <text x="48" y="18" font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="rgba(255,255,255,0.85)" letter-spacing="1">035 F ARKOH</text>
  <text x="48" y="34" font-family="Arial, sans-serif" font-size="13" font-weight="800" fill="white" letter-spacing="0.5">WASTE MGT</text>
